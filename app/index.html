<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Automated daily MLB intelligence — Cardinals pinned, Nationals secondary, full league coverage." />
<meta name="theme-color" content="#0E1821" />
<title>Baseball Daily Intelligence</title>
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="stylesheet" href="styles/main.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-icon" aria-hidden="true">⚾</span>
    <span class="brand-text">Baseball Daily Intelligence</span>
  </div>
  <nav class="tabs" id="tabs" aria-label="Main navigation">
    <button class="tab active" data-tab="daily">Daily Report</button>
    <button class="tab" data-tab="cardinals">Cardinals</button>
    <button class="tab" data-tab="teams">Teams</button>
    <button class="tab" data-tab="players">Players</button>
    <button class="tab" data-tab="history">History</button>
    <button class="tab" data-tab="stories">Stories</button>
  </nav>
</header>

<main id="main">
  <section id="tab-daily"     class="panel active" aria-labelledby="daily-heading"></section>
  <section id="tab-cardinals" class="panel"></section>
  <section id="tab-teams"     class="panel"></section>
  <section id="tab-players"   class="panel"></section>
  <section id="tab-history"   class="panel"></section>
  <section id="tab-stories"   class="panel"></section>
</main>

<footer class="footer">
  <span>Baseball Daily v5 · <span id="last-updated">no snapshot yet</span></span>
  <span>Data: MLB Stats API</span>
</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
