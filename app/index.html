<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="description" content="Ozark Joe's Baseball Daily Intelligence Report — automated daily MLB intelligence with Cardinals and Nationals focus." />
<meta name="theme-color" content="#0E1821" />
<title>Ozark Joe's Baseball Daily Intelligence Report</title>
<link rel="icon" href="icon.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon-180x180.png" />
<link rel="apple-touch-icon" sizes="167x167" href="icons/apple-touch-icon-167x167.png" />
<link rel="apple-touch-icon" sizes="152x152" href="icons/apple-touch-icon-152x152.png" />
<link rel="apple-touch-icon" sizes="120x120" href="icons/apple-touch-icon-120x120.png" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="stylesheet" href="styles/main.css" />
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="brand-icon" aria-hidden="true">⚾</span>
    <span class="brand-text">Ozark Joe's Baseball Daily Intelligence Report</span>
    <span id="app-version" class="app-version" aria-label="App version"></span>
  </div>
  <nav class="tabs" id="tabs" aria-label="Main navigation">
    <button class="tab active" data-tab="daily">Daily Report</button>
    <button class="tab" data-tab="cardinals">Cardinals</button>
    <button class="tab" data-tab="teams">Teams</button>
    <button class="tab" data-tab="players">Players</button>
    <button class="tab" data-tab="history">History</button>
    <button class="tab" data-tab="stories">Stories</button>
    <button class="tab" data-tab="trivia">Trivia</button>
  </nav>
</header>

<main id="main">
  <section id="tab-daily"     class="panel active" aria-labelledby="daily-heading"></section>
  <section id="tab-cardinals" class="panel"></section>
  <section id="tab-teams"     class="panel"></section>
  <section id="tab-players"   class="panel"></section>
  <section id="tab-history"   class="panel"></section>
  <section id="tab-stories"   class="panel"></section>
  <section id="tab-trivia"    class="panel"></section>
</main>

<footer class="footer">
  <span>Ozark Joe's Baseball Daily v7 · <span id="last-updated">no snapshot yet</span></span>
  <span><a href="#" class="suggest-link" data-suggest>Suggest a player or moment</a> · Data: MLB Stats API</span>
</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
