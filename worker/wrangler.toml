name = "baseball-daily-api"
main = "src/index.js"
compatibility_date = "2026-01-01"

# Free tier: 100k requests/day. This Worker serves three POST routes:
#   /submit   — public submission → GitHub Issue (KB-0024, dormant until Suggest UI wires up)
#   /ai       — AI Q&A proxy → Anthropic Messages API (KB-0033)
#   /refresh  — public on-demand ingestion trigger → workflow_dispatch (KB-0020)
# Plus a GET /health for sanity checks.

[vars]
GITHUB_REPO       = "jjmgladden/baseball-daily"
ALLOWED_ORIGINS   = "https://jjmgladden.github.io,http://localhost:1882"
ALLOWED_TYPES     = "player,moment,other"
WORKER_NAME       = "baseball-daily-api"

# AI configuration (KB-0033)
AI_MODEL          = "claude-haiku-4-5-20251001"
AI_DISABLED       = "false"
AI_CONTEXT_URL    = "https://jjmgladden.github.io/baseball-daily/data/snapshots/ai-context.json"

# Refresh configuration (KB-0020)
REFRESH_WORKFLOW  = "daily.yml"
REFRESH_REF       = "main"

# Secrets (set via the Cloudflare dashboard — XPL-001: do NOT use `wrangler secret put`
# on Windows, paste mangling can leave the secret as a single character):
#   GITHUB_TOKEN       — fine-grained PAT scoped to jjmgladden/baseball-daily only.
#                        Required for /submit (issues:write) AND /refresh (actions:write).
#                        ONE token covers both routes.
#                        OK to leave unset; both routes return 500 with a clear message.
#   ANTHROPIC_API_KEY  — Anthropic API key (sk-ant-api03-...). Required for /ai.

# To disable the AI feature without redeploying, run:
#   wrangler secret put AI_DISABLED   (or set AI_DISABLED="true" in [vars] above)
