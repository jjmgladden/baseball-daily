name: Daily Ingestion

# Runs the MLB ingestion every morning and commits a fresh snapshot.
# Replaces the local run_daily.bat on Windows Task Scheduler.
#
# Cron time is 07:00 UTC = 3:00 AM Eastern Daylight Time.
# During Eastern Standard Time (Nov-Mar) this fires at 2:00 AM local —
# still well before the target morning read window.
# (Target user is based in Virginia and gets up early.)
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch: {}   # allow manual "Run workflow" from the Actions tab

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to commit the snapshot back to the repo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch daily data
        run: node ingestion/fetch-daily.js
        env:
          # Empty for now; add when YouTube ingestion is wired (KB-0003).
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}

      - name: Commit and push snapshot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/
          if git diff --staged --quiet; then
            echo "No snapshot changes to commit."
          else
            git commit -m "Daily snapshot $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Send morning email
        # Skips silently if RESEND_API_KEY or EMAIL_RECIPIENTS aren't configured,
        # so enabling/disabling is just a GitHub Secret change — no YAML edits.
        if: success()
        run: node ingestion/send-email.js
        env:
          RESEND_API_KEY:   ${{ secrets.RESEND_API_KEY }}
          EMAIL_RECIPIENTS: ${{ secrets.EMAIL_RECIPIENTS }}
          EMAIL_FROM:       ${{ secrets.EMAIL_FROM }}
