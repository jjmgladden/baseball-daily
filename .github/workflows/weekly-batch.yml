name: Weekly Curation Batch

# Every Monday morning, picks the next 10 pending entries from
# data/master/curation-backlog.json (sorted by priority then id) and
# opens a GitHub Issue with clickable checkboxes for per-entry approval.
# The owner taps boxes in the Issue, closes it, and Claude applies the
# checked entries on the next session.
#
# Cron: 08:00 UTC Monday = 4:00 AM EDT (3:00 AM EST) Monday.
on:
  schedule:
    - cron: '0 8 * * 1'
  workflow_dispatch:
    inputs:
      batch_size:
        description: 'Number of entries to include this batch'
        required: false
        default: '10'

jobs:
  create-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build batch Issue body
        id: build
        run: |
          node <<'EOF'
          const fs = require('fs');
          const batchSize = parseInt(process.env.BATCH_SIZE || '10', 10);
          const data = JSON.parse(fs.readFileSync('data/master/curation-backlog.json', 'utf8'));
          const pending = (data.entries || []).filter(e => e.status === 'pending');
          pending.sort((a, b) => {
            if ((a.priority ?? 9) !== (b.priority ?? 9)) return (a.priority ?? 9) - (b.priority ?? 9);
            return (a.id || '').localeCompare(b.id || '');
          });
          const batch = pending.slice(0, batchSize);

          const today = new Date().toISOString().slice(0, 10);
          const title = `Weekly curation batch ${today} — ${batch.length} entries for review`;

          const lines = [
            `@jjmgladden — new weekly curation batch ready for your review.`,
            '',
            `Automatic weekly pull from \`data/master/curation-backlog.json\`. ${pending.length - batch.length} entries remain pending after this batch.`,
            '',
            '## Quick action',
            '',
            '- [ ] ✅ **Approve ALL entries below** — fastest path; tap this one box and close the Issue.',
            '  (If this is checked, individual boxes below are ignored and everything is approved.)',
            '',
            '---',
            '',
            '## Or tap individual boxes for finer control',
            '',
            '1. Tap boxes for entries you want added.',
            '2. Leave unchecked for entries you want to skip (they stay in the backlog for future weeks).',
            '3. **Close the Issue** when done (or add a comment like `done`).',
            '',
            'Claude reads the checkbox state on the next session and applies approved entries to the relevant master file based on `type`: `legend`/`broadcaster`/`coach`/`executive` → `legends-general.json`; `moment` → `historical-videos.json`; `story` → `stories.json`; `umpire` → `legends-general.json` (category=umpire); `trivia` → `trivia.json`.',
            '',
            '## Batch',
            '',
          ];

          for (let i = 0; i < batch.length; i++) {
            const e = batch[i];
            lines.push(`- [ ] **${i + 1}. ${e.name}** (\`${e.id}\`) · *${e.type}* · priority ${e.priority}`);
            lines.push(`  ${e.summary || '(no summary)'}`);
            lines.push('');
          }

          lines.push('---');
          lines.push('');
          lines.push('💡 **Want a themed batch instead?** Reply in chat with Claude: *"do a [theme] batch"* — examples: *brothers in baseball*, *father-son duos*, *WWII veterans*, *Cardinals managers*, *iconic umpire moments*, *1985 Cardinals stories*. Claude curates the theme and opens a separate Issue for your review.');

          fs.writeFileSync('.github/batch-body.md', lines.join('\n'));
          require('fs').appendFileSync(process.env.GITHUB_OUTPUT, `title=${title}\ncount=${batch.length}\n`);
          EOF
        env:
          BATCH_SIZE: ${{ github.event.inputs.batch_size || '10' }}

      - name: Create Issue
        if: steps.build.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --repo ${{ github.repository }} \
            --title "${{ steps.build.outputs.title }}" \
            --label "weekly-batch,needs-review" \
            --body-file .github/batch-body.md

      - name: No-op if backlog empty
        if: steps.build.outputs.count == '0'
        run: echo "Backlog is empty — no Issue created."
